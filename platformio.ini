[env:lilygo-t-display-s3-amoled-plus]
build_type = debug
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Serial monitor
monitor_speed = 115200

; Flash via USB (native ESP32-S3 USB)
upload_protocol = esptool
upload_speed    = 921600

; Partition scheme with OTA support (8 MB flash, dual OTA slots)
board_build.partitions = default_8MB.csv

; PSRAM (8 MB PSRAM on ESP32-S3R8)
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192
    -DLV_CONF_INCLUDE_SIMPLE
    -I include

; Library dependencies
lib_deps =
    ; LilyGo AMOLED board support (display + touch)
    https://github.com/Xinyuan-LilyGO/LilyGo-AMOLED-Series.git
    ; LVGL 8.x UI framework
    lvgl/lvgl @ ^8.4.0
    ; DS18B20 temperature sensor
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
    ; JSON payload for BEEP API
    bblanchon/ArduinoJson @ ^7.3.1
    ; HX711 load cell ADC (bit-bang driver)
    bogde/HX711 @ ^0.7.5

; LVGL configuration
lib_ldf_mode  = deep+
build_src_filter = +<*> -<.git/> -<.svn/>
